name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - 'windows/**'
      - '.github/workflows/build-windows-exe.yml'

jobs:
  build:
    runs-on: windows-latest
    env:
      LIBWDI_REF: v1.5.1
      LIBUSB_VERSION: "1.0.29"
      LIBERATION_VERSION: "2.1.5"
      LIBERATION_TTF_URL: "https://github.com/liberationfonts/liberation-fonts/files/7261482/liberation-fonts-ttf-2.1.5.tar.gz"
      WDK_URL: https://go.microsoft.com/fwlink/p/?LinkID=253170
      LIBUSB0_URL: https://github.com/mcuee/libusb-win32/releases/download/release_1.4.0.0/libusb-win32-bin-1.4.0.0.zip
      LIBUSBK_URL: https://github.com/mcuee/libusbk/releases/download/V3.1.0.0/libusbK-3.1.0.0-bin.7z
      BUILD_MACROS: '"WDK_DIR=\"../wdk/Windows Kits/8.0\";LIBUSB0_DIR=\"../libusb0\";LIBUSBK_DIR=\"../libusbk/bin\""'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache wdi-simple.exe
        id: cache-wdi
        uses: actions/cache@v4
        with:
          path: windows/wdi-simple.exe
          key: wdi-simple-${{ env.LIBWDI_REF }}-x64-v1

      - name: Clone libwdi + fetch driver redists
        if: steps.cache-wdi.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          git clone --depth 1 --branch %LIBWDI_REF% https://github.com/pbatard/libwdi.git libwdi-src
          cd libwdi-src
          curl -L %WDK_URL% -o wdk-redist.msi
          curl -L %LIBUSB0_URL% -o libusb0-redist.zip
          curl -L %LIBUSBK_URL% -o libusbk-redist.7z
          msiexec /a wdk-redist.msi /qn TARGETDIR=%CD%\wdk
          7z x libusb0-redist.zip
          7z x libusbk-redist.7z
          del *.zip *.7z *.msi 2>nul
          for /d %%D in (libusb-win32*) do move "%%D" libusb0
          for /d %%D in (libusbK*) do move "%%D" libusbk

      - name: Add MSBuild to PATH
        if: steps.cache-wdi.outputs.cache-hit != 'true'
        uses: microsoft/setup-msbuild@v2

      - name: Build wdi-simple.exe
        if: steps.cache-wdi.outputs.cache-hit != 'true'
        shell: cmd
        working-directory: libwdi-src
        run: msbuild libwdi.sln /m /p:Configuration=Release,Platform=x64,BuildMacros=${{ env.BUILD_MACROS }}

      - name: Stage wdi-simple.exe
        if: steps.cache-wdi.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          if not exist windows mkdir windows
          copy /Y libwdi-src\x64\Release\examples\wdi-simple.exe windows\wdi-simple.exe

      - name: Download libusb-1.0.dll
        shell: pwsh
        env:
          LIBUSB_VER: ${{ env.LIBUSB_VERSION }}
        run: |
          $url = "https://github.com/libusb/libusb/releases/download/v${env:LIBUSB_VER}/libusb-${env:LIBUSB_VER}.7z"
          Invoke-WebRequest -Uri $url -OutFile libusb.7z
          7z x libusb.7z -olibusb-bin | Out-Null
          Copy-Item "libusb-bin\VS2022\MS64\dll\libusb-1.0.dll" "windows\libusb-1.0.dll"

      - name: Download Liberation Mono fonts
        shell: pwsh
        env:
          LIB_URL: ${{ env.LIBERATION_TTF_URL }}
          LIB_VER: ${{ env.LIBERATION_VERSION }}
        run: |
          New-Item -ItemType Directory -Force -Path windows\fonts | Out-Null
          Invoke-WebRequest -Uri $env:LIB_URL -OutFile liberation.tar.gz
          tar -xzf liberation.tar.gz
          $src = "liberation-fonts-ttf-$env:LIB_VER"
          foreach ($f in @("LiberationMono-Regular.ttf","LiberationMono-Bold.ttf","LiberationMono-Italic.ttf","LiberationMono-BoldItalic.ttf")) {
            Copy-Item "$src\$f" "windows\fonts\$f"
          }

      - name: Stage firmware and CA cert
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows\data | Out-Null
          Copy-Item firmware\V84.20.23Z.zip windows\data\V84.20.23Z.zip
          Copy-Item ssl\rootCA.crt           windows\data\rootCA.crt

      - name: Install Python build dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip pyusb pyinstaller passlib

      - name: Build exes
        shell: cmd
        working-directory: windows
        run: call build.bat

      - name: Upload exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zebra-windows-tools
          path: |
            windows/dist/upload_liberation_mono.exe
            windows/dist/zebra_flash_zd420.exe
            windows/dist/zebra_wifi_setup.exe
          if-no-files-found: error
